<app-toolbar (overviewSearch)="setSearch($event)"></app-toolbar>
<div class="overview-container">
  <div>
    <h1>Logbooks</h1>
    <mat-button-toggle-group [(ngModel)]="matCardType">
      <mat-button-toggle value="logbook-module"><mat-icon>view_module</mat-icon></mat-button-toggle>
      <mat-button-toggle value="logbook-headline"
        ><mat-icon>view_headline</mat-icon></mat-button-toggle
      >
    </mat-button-toggle-group>
    <button mat-flat-button color="primary" [matMenuTriggerFor]="addMenu">
      Add logbook
      <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #addMenu>
      <button mat-menu-item (click)="addCollectionLogbook('logbook')">New logbook</button>
      <button mat-menu-item (click)="importEln()">Import from .eln</button>
    </mat-menu>
    <br />
    <mat-spinner *ngIf="!overviewComponent?.isLoaded" [@spinner] class="spinner"></mat-spinner>
    <app-overview-table
      *ngIf="matCardType === 'logbook-headline'"
      [config]="config"
      (logbookEdit)="editLogbook($event)"
      (logbookSelection)="logbookSelected($event)"
    ></app-overview-table>
    <app-overview-scroll
      *ngIf="matCardType === 'logbook-module'"
      [config]="config"
      (logbookEdit)="editLogbook($event)"
      (logbookSelection)="logbookSelected($event)"
    ></app-overview-scroll>
  </div>
</div>
